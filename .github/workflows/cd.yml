name: CD

on:
  push:
    branches: [main]  # only deploy when code lands on main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag (git SHA, so every deploy is traceable)
        id: meta
        run: echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy new image
        run: |
          echo "Deploying image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image_tag }}"
          # Replace this with your real deploy step, e.g.:
          #   - Fly.io:   flyctl deploy --image <image>
          #   - Render:   curl deploy hook URL (stored in secrets.RENDER_DEPLOY_HOOK)
          #   - VPS/SSH:  ssh into host, docker pull, docker compose up -d
          # Example using a deploy hook stored as a secret:
          # curl -X POST "${{ secrets.DEPLOY_HOOK_URL }}"

      - name: Wait for service to come up
        run: sleep 15

      - name: Health check
        id: health
        run: |
          # Replace with your real deployed URL
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.APP_HEALTH_URL }}" || echo "000")
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed with status $STATUS"
            exit 1
          fi

      - name: Rollback on failed health check
        if: failure()
        run: |
          echo "Deployment failed health check — rolling back to previous stable tag."
          # Real rollback example (Fly.io): flyctl releases rollback
          # Real rollback example (VPS): docker pull <registry>/<image>:previous-stable && docker compose up -d
          echo "Rollback step executed (placeholder — wire up to your host)."
