name: CD

on:
  push:
    branches: [main]  # only deploy when code lands on main

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      image_name: ${{ steps.lowercase.outputs.image_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute lowercase image name
        id: lowercase
        run: |
          echo "image_name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Preserve current 'latest' as 'previous-stable' (for rollback)
        run: |
          docker pull ${{ env.REGISTRY }}/${{ steps.lowercase.outputs.image_name }}:latest || echo "No existing 'latest' image yet — skipping"
          if docker image inspect ${{ env.REGISTRY }}/${{ steps.lowercase.outputs.image_name }}:latest > /dev/null 2>&1; then
            docker tag ${{ env.REGISTRY }}/${{ steps.lowercase.outputs.image_name }}:latest ${{ env.REGISTRY }}/${{ steps.lowercase.outputs.image_name }}:previous-stable
            docker push ${{ env.REGISTRY }}/${{ steps.lowercase.outputs.image_name }}:previous-stable
          fi

      - name: Set image tag (git SHA, so every deploy is traceable)
        id: meta
        run: echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.lowercase.outputs.image_name }}:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ steps.lowercase.outputs.image_name }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy docker-compose.prod.yml to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.prod.yml"
          target: "~/agentic-capstone"

      - name: SSH in and deploy new image
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/agentic-capstone
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            export GITHUB_REPOSITORY=${{ needs.build-and-push.outputs.image_name }}
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f

      - name: Wait for service to come up
        run: sleep 15

      - name: Health check
        id: health
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            for i in 1 2 3 4 5; do
              echo "Attempt $i/5..."
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 http://localhost:8000/health 2>/dev/null) || STATUS="000"
              echo "  Status: $STATUS"
              if [ "$STATUS" = "200" ]; then
                echo "Health check passed!"
                exit 0
              fi
              echo "  Not ready yet, waiting 10s..."
              sleep 10
            done
            echo "Health check failed after 5 attempts (last status: $STATUS)"
            exit 1

      - name: Rollback on failed health check
        if: failure()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/agentic-capstone
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            export GITHUB_REPOSITORY=${{ needs.build-and-push.outputs.image_name }}
            echo "Rolling back to previous stable image..."
            docker pull ghcr.io/${GITHUB_REPOSITORY}:previous-stable
            docker tag ghcr.io/${GITHUB_REPOSITORY}:previous-stable ghcr.io/${GITHUB_REPOSITORY}:latest
            docker compose -f docker-compose.prod.yml up -d
